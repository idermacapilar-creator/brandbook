<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Fotos Full Page</title>
    <!-- Outfit Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400&display=swap" rel="stylesheet">
    <!-- Flaticon CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo-container {
            height: 40px;
            display: flex;
            align-items: center;
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            color: #cccccc;
            font-size: 24px;
            width: 180px;
            text-align: left;
        }

        .brand-bold {
            font-weight: 700; /* Bold */
        }

        .brand-thin {
            font-weight: 100; /* Thin */
        }

        .menu-toggle {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            cursor: pointer;
            background: transparent;
            border: none;
            position: relative;
            z-index: 2000;
        }
        
        .menu-icon {
            position: relative;
            width: 40px;
            height: 40px;
            transition: transform 0.5s ease;
        }
        
        .menu-icon svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            stroke: white;
            stroke-width: 1.5;
            stroke-linecap: round;
            transition: opacity 0.3s ease, transform 0.5s ease;
        }
        
        .menu-icon .hamburger {
            opacity: 1;
            transform: rotate(0deg);
        }
        
        .menu-icon .close {
            opacity: 0;
            transform: rotate(-90deg);
        }
        
        .menu-active .menu-icon .hamburger {
            opacity: 0;
            transform: rotate(90deg);
        }
        
        .menu-active .menu-icon .close {
            opacity: 1;
            transform: rotate(0deg);
        }

        .menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            transition: right 0.5s ease;
            z-index: 999;
            padding: 60px 20px 20px;
        }

        .menu.active {
            right: 0;
        }

        .close-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 24px;
        }

        .menu ul {
            list-style: none;
            margin-top: 40px;
        }

        .menu ul li {
            margin-bottom: 20px;
            position: relative;
        }

        .menu ul li a {
            color: #fff;
            text-decoration: none;
            font-weight: 100;
            font-size: 20px;
            letter-spacing: 1px;
            display: inline-block;
            position: relative;
            transition: transform 0.3s ease;
            padding: 5px 0;
        }

        .menu ul li a:hover {
            transform: translateX(20px);
            color: #fff;
        }
        
        .menu ul li a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -3px; /* Punto de inicio más cercano */
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, 
                rgba(255,215,0,0) 0%, 
                rgba(255,215,0,0.2) 10%,
                rgba(255,215,0,1) 50%, 
                rgba(255,215,0,0.2) 90%,
                rgba(255,215,0,0) 100%);
            opacity: 0;
            filter: blur(0.5px);
            box-shadow: 0 0 2px rgba(255,215,0,0.6);
            transition: all 0.6s ease-out; /* Transición más rápida */
        }
        
        .menu ul li a:hover::after {
            opacity: 1;
            left: 0; /* Solo se mueve 3px */
        }
        
        .menu ul li a:hover::after {
            opacity: 1;
            transition-delay: 0.2s;
        }

        .gallery {
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .caption {
            position: absolute;
            bottom: 50px;
            left: 50px;
            max-width: 80%;
        }

        .caption h2 {
            font-weight: 200;
            font-size: 26px;
            margin-bottom: 10px;
        }

        .caption p {
            font-weight: 100;
            font-size: 18px;
        }

        .navigation {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .caption {
                bottom: 30px;
                left: 30px;
            }

            .caption h2 {
                font-size: 24px;
            }

            .caption p {
                font-size: 14px;
            }

            .navigation {
                bottom: 20px;
                right: 20px;
            }

            .nav-btn {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <h1 class="logo-text"><span class="brand-bold">Brand</span><span class="brand-thin">book</span></h1>
        </div>
        <div class="menu-icon" id="menuToggle">
            <svg class="hamburger" viewBox="0 0 24 24" fill="none">
                    <path d="M3 6h18M3 12h18M3 18h18" />
                </svg>
                <svg class="close" viewBox="0 0 24 24" fill="none">
                    <path d="M18 6L6 18M6 6l12 12" />
                </svg>
        </div>
    </header>

    <nav class="menu" id="mainMenu">
        <div class="close-menu" id="closeMenu">
            <i class="fas fa-times"></i>
        </div>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Video de presentación</a></li>
            <li><a href="#">Propuesta uniformes</a></li>
            <li><a href="#">Cartelería</a></li>
            <li><a href="#">Web</a></li>
        </ul>
    </nav>

    <div class="gallery" id="gallery">
        <!-- Slides will be populated with JavaScript -->
    </div>

    <div class="navigation">
        <button class="nav-btn" id="prevBtn">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="nav-btn" id="pauseBtn">
            <i class="fas fa-pause" id="pauseIcon"></i>
        </button>
        <button class="nav-btn" id="nextBtn">
            <i class="fas fa-chevron-right"></i>
        </button>
    </div>

    <script>
        // Sample gallery data
        const galleryData = [
            {
                image: "images/caratula-brandbook.jpg",
                title: "Cover",
                description: "P.1"
            },
			{
                image: "images/p.1.jpg",
                title: "",
                description: "P.2"
            },
            {
                image: "images/p.2.jpg",
                title: "Intro",
                description: "P.3"
            },
            {
                image: "images/p.3.jpg",
                title: "Glosario",
                description: "P.4"
            },
            {
                image: "images/p.4.jpg",
                title: "Logotipo",
                description: "A.01"
            },
			{
                image: "images/p.5.jpg",
                title: "Influencia",
                description: "A.01b"
            },
			{
                image: "images/p.6.jpg",
                title: "Elemento adicional",
                description: "A.01c"
            },
			{
                image: "images/p.7.jpg",
                title: "Área de seguridad",
                description: "A.02"
            },
			{
                image: "images/p.8.jpg",
                title: "Área de seguridad",
                description: "A.02b"
            },
			{
                image: "images/p.9.jpg",
                title: "Área de seguridad",
                description: "A.02c"
            },
			{
                image: "images/p.10.jpg",
                title: "Área de seguridad",
                description: "A.03"
            },
			{
                image: "images/p.11.jpg",
                title: "Área de seguridad",
                description: "A.03b"
            },
			{
                image: "images/p.12.jpg",
                title: "Área de seguridad",
                description: "A.03c"
            },
        ];

        // DOM Elements
        const gallery = document.getElementById('gallery');
        const menuToggle = document.getElementById('menuToggle');
        const closeMenu = document.getElementById('closeMenu');
        const mainMenu = document.getElementById('mainMenu');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Current slide index
        let currentSlide = 0;
        let isPaused = false;
        let mouseTimer;

        // Initialize gallery
        function initGallery() {
            // Create slides
            galleryData.forEach((item, index) => {
                const slide = document.createElement('div');
                slide.className = `slide ${index === 0 ? 'active' : ''}`;
                
                const img = document.createElement('img');
                img.src = item.image;
                img.alt = item.title;
                
                const caption = document.createElement('div');
                caption.className = 'caption';
                
                const title = document.createElement('h2');
                title.textContent = item.title;
                
                const description = document.createElement('p');
                description.textContent = item.description;
                
                caption.appendChild(title);
                caption.appendChild(description);
                
                slide.appendChild(img);
                slide.appendChild(caption);
                
                gallery.appendChild(slide);
            });
            
            // Now that DOM is initialized, get pause button and icon
            const pauseBtn = document.getElementById('pauseBtn');
            const pauseIcon = document.getElementById('pauseIcon');
            
            // Add event listener for pause button
            pauseBtn.addEventListener('click', () => {
                isPaused = !isPaused;
                
                if (isPaused) {
                    clearInterval(slideInterval);
                    pauseIcon.classList.remove('fa-pause');
                    pauseIcon.classList.add('fa-play');
                } else {
                    slideInterval = setInterval(nextSlide, 5000);
                    pauseIcon.classList.remove('fa-play');
                    pauseIcon.classList.add('fa-pause');
                }
            });
        }

        // Show specific slide
        function showSlide(index) {
            const slides = document.querySelectorAll('.slide');
            
            // Reset all slides
            slides.forEach(slide => {
                slide.classList.remove('active');
            });
            
            // Handle index bounds
            if (index < 0) {
                currentSlide = slides.length - 1;
            } else if (index >= slides.length) {
                currentSlide = 0;
            } else {
                currentSlide = index;
            }
            
            // Activate current slide
            slides[currentSlide].classList.add('active');
        }

        // Next slide
        function nextSlide() {
            showSlide(currentSlide + 1);
        }

        // Previous slide
        function prevSlide() {
            showSlide(currentSlide - 1);
        }

        // Auto slide
        let slideInterval = setInterval(nextSlide, 15000);

        // Reset interval when manually changing slides
        function resetInterval() {
            clearInterval(slideInterval);
            if (!isPaused) {
                slideInterval = setInterval(nextSlide, 5000);
            }
        }
        
        // Pause on mouse movement
        function handleMouseMove() {
            if (!isPaused) {
                // Pause slideshow temporarily
                clearInterval(slideInterval);
                
                // Clear any existing timeout
                clearTimeout(mouseTimer);
                
                // Set a new timeout to resume after 2 seconds of no mouse movement
                mouseTimer = setTimeout(() => {
                    if (!isPaused) {
                        slideInterval = setInterval(nextSlide, 5000);
                    }
                }, 2000);
            }
        }

        // Event listeners
        menuToggle.addEventListener('click', () => {
            mainMenu.classList.add('active');
        });

        closeMenu.addEventListener('click', () => {
            mainMenu.classList.remove('active');
        });

        prevBtn.addEventListener('click', () => {
            prevSlide();
            resetInterval();
        });

        nextBtn.addEventListener('click', () => {
            nextSlide();
            resetInterval();
        });
        
        // Add mouse movement listener to the entire document
        document.addEventListener('mousemove', handleMouseMove);

        // Handle keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                prevSlide();
                resetInterval();
            } else if (e.key === 'ArrowRight') {
                nextSlide();
                resetInterval();
            }
        });

        // Handle mouse wheel navigation
        document.addEventListener('wheel', (e) => {
            // Prevent default scrolling behavior
            e.preventDefault();
            
            // Determine scroll direction
            if (e.deltaY > 0) {
                // Scroll down - next slide
                nextSlide();
                resetInterval();
            } else {
                // Scroll up - previous slide
                prevSlide();
                resetInterval();
            }
        }, { passive: false });

        // Handle swipe on touch devices
        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) {
                // Swipe left
                nextSlide();
                resetInterval();
            } else if (touchEndX > touchStartX + threshold) {
                // Swipe right
                prevSlide();
                resetInterval();
            }
        }

        // Initialize gallery on page load
        window.addEventListener('load', initGallery);
    </script>
</body>
</html>
